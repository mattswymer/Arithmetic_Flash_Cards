<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Flash Cards</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        /* --- Core Styles & Theme Variables --- */
        :root {
            --light-bg: #f0f2f5;
            --dark-bg: #18191a;
            --light-card-bg: #ffffff;
            --dark-card-bg: #242526;
            --light-text: #1c1e21;
            --dark-text: #e4e6eb;
            --light-gray-text: #606770;
            --dark-gray-text: #b0b3b8;
            --light-border: #dddfe2;
            --dark-border: #3a3b3c;
            --light-option-bg: #e7f3ff;
            --dark-option-bg: #3a3b3c;
            --light-hover-bg: #e9ebee;
            --dark-hover-bg: #4e4f50;

            --primary-color: #0866ff;
            --green-color: #31a24c;
            --red-color: #e41e3f;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --dark-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        body.light-theme {
            --bg-color: var(--light-bg);
            --card-bg: var(--light-card-bg);
            --text-color: var(--light-text);
            --gray-text: var(--light-gray-text);
            --border-color: var(--light-border);
            --option-bg: var(--light-option-bg);
            --hover-bg: var(--light-hover-bg);
            --current-shadow: var(--shadow);
        }

        body.dark-theme {
            --bg-color: var(--dark-bg);
            --card-bg: var(--dark-card-bg);
            --text-color: var(--dark-text);
            --gray-text: var(--dark-gray-text);
            --border-color: var(--dark-border);
            --option-bg: var(--dark-option-bg);
            --hover-bg: var(--dark-hover-bg);
            --current-shadow: var(--dark-shadow);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- App Container (Mobile First & Centered) --- */
        .app-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Top Header (Donate & Theme) --- */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .donate-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--gray-text);
        }
        .donate-banner img {
            height: 22px;
            width: auto;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }
        .donate-banner img:hover { opacity: 1; }

        .theme-switcher select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            box-shadow: var(--current-shadow);
            cursor: pointer;
        }

        /* --- Stats Panel (Horizontal Grid) --- */
        .stats-panel {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--current-shadow);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
        }
        .stat-item span:first-child { color: var(--gray-text); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-item span:last-child { font-weight: bold; font-size: 1.1rem; margin-top: 4px; }

        /* --- Progress Bar --- */
        .progress-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .progress-info {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--gray-text);
            margin-bottom: 6px;
            visibility: hidden;
        }
        .progress-info.active {
            visibility: visible;
            animation: fadeIn 0.4s ease-out;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            visibility: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 4px;
            transition: width 0.3s ease-in-out;
        }

        /* --- Flash Card Styling --- */
        .card-container {
            width: 100%;
            height: clamp(250px, 40vh, 350px);
            perspective: 1000px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
            box-shadow: var(--current-shadow);
            border-radius: 18px;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }
        .card-back { transform: rotateY(180deg); }
        .card-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-text);
            position: absolute;
            top: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card.in-session .card-label { opacity: 1; }
        .card-content {
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            max-width: 90%;
        }
        .card-back .card-content { color: var(--primary-color); }

        .initial-card-text {
            font-size: clamp(1.5rem, 6vw, 2.5rem) !important;
            color: var(--gray-text);
            text-align: center;
            line-height: 1.4;
        }
        .initial-card-subtext {
            display: block;
            font-size: 1.1rem;
            color: var(--gray-text);
            margin-top: 10px;
        }
        .end-session-message {
            font-size: 2rem;
            color: var(--text-color);
            animation: fadeIn 0.8s ease-out;
            text-align: center;
        }
        .end-session-message span {
            display: block;
            font-size: 1.1rem;
            color: var(--gray-text);
            margin-top: 12px;
            line-height: 1.4;
        }

        /* --- Action Buttons --- */
        .action-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .action-btn {
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .action-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.25);
        }
        .action-btn:active:not(:disabled) { transform: translateY(1px); }
        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .action-btn svg { width: 34px; height: 34px; }
        #check-btn {
            width: 130px;
            height: 55px;
            border-radius: 28px;
            font-size: 1.3rem;
            font-weight: 600;
            background-color: var(--primary-color);
        }
        #wrong-btn { background-color: var(--red-color); }
        #correct-btn { background-color: var(--green-color); }

        /* --- Bottom Controls --- */
        .controls-container {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: var(--current-shadow);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease-out 0.2s;
            animation-fill-mode: backwards;
        }
        .control-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .control-group:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .control-header h3 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--gray-text);
        }
        .text-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
        }
        .text-btn:hover { background-color: var(--hover-bg); }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .options label {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--option-bg);
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary-color);
            user-select: none;
            flex-grow: 1;
            text-align: center;
        }
        .dark-theme .options label { color: var(--dark-text); }
        .options input[type="checkbox"] { display: none; }
        .options input[type="checkbox"]:checked + label {
            background-color: var(--primary-color);
            color: white;
        }

        .range-inputs {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .range-inputs label {
            color: var(--gray-text);
            font-weight: 600;
            font-size: 1rem;
        }
        .range-inputs input {
            width: 65px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1.1rem;
            text-align: center;
            margin-left: 8px;
        }

        .session-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .session-btn {
            flex-grow: 1;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        #new-session-btn {
            background-color: var(--green-color);
            color: white;
            border-color: var(--green-color);
        }
        #reset-btn {
            background-color: transparent;
            color: var(--gray-text);
        }
        #reset-btn:hover { background-color: var(--hover-bg); }

        /* --- Mobile Tweaks --- */
        @media (max-width: 600px) {
            .stats-panel { grid-template-columns: repeat(2, 1fr); }
            .top-header { justify-content: center; }
            .action-buttons { gap: 15px; }
            .action-btn { width: 55px; height: 55px; }
            #check-btn { width: 110px; height: 50px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="top-header">
            <div class="donate-banner">
                <span>Like this app?</span>
                <a href="https://www.paypal.me/mattswymer84" target="_blank" title="PayPal">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/PayPal_2024_%28Icon%29.svg/250px-PayPal_2024_%28Icon%29.svg.png" alt="PayPal Icon" onerror="this.style.display='none'">
                </a>
                <a href="https://venmo.com/mattswymer" target="_blank" title="Venmo">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Venmo_logo.png/1200px-Venmo_logo.png" alt="Venmo Icon" onerror="this.style.display='none'">
                </a>
            </div>
            <div class="theme-switcher">
                <select id="theme-select" aria-label="Select color theme">
                    <option value="system">System Default</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stat-item"><span>Total</span> <span id="total-cards">0</span></div>
            <div class="stat-item"><span>Remaining</span> <span id="cards-remaining">0</span></div>
            <div class="stat-item"><span>Accuracy</span> <span id="percentage-correct">--</span></div>
            <div class="stat-item"><span>Attempts</span> <span id="total-attempts">0</span></div>
            <div class="stat-item"><span>Correct</span> <span id="num-correct">0</span></div>
            <div class="stat-item"><span>Incorrect</span> <span id="num-incorrect">0</span></div>
        </div>

        <div class="progress-wrapper">
            <div id="progress-info" class="progress-info">0% complete</div>
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <div class="card-container">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="card-label">Problem</div>
                    <div id="card-text" class="card-content"></div>
                </div>
                <div class="card-face card-back">
                    <div class="card-label">Answer</div>
                    <div id="card-answer" class="card-content"></div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="wrong-btn" aria-label="Mark as incorrect" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="action-btn" id="check-btn" aria-label="Check answer" disabled>Check</button>
            <button class="action-btn" id="correct-btn" aria-label="Mark as correct" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
        </div>

        <div class="controls-container">
            <div class="control-group">
                <div class="control-header">
                    <h3>1. Focus Numbers</h3>
                    <div>
                        <button class="text-btn" id="select-all-btn">Select All</button>
                        <button class="text-btn" id="clear-all-btn">Clear</button>
                    </div>
                </div>
                <div class="options" id="numbers-options"></div>
            </div>

            <div class="control-group">
                <div class="control-header">
                    <h3>2. Range (Tested against)</h3>
                </div>
                <div class="range-inputs">
                    <label>Min: <input type="number" id="range-min" value="0" min="0" max="100"></label>
                    <label>Max: <input type="number" id="range-max" value="12" min="0" max="100"></label>
                </div>
            </div>

            <div class="control-group">
                <div class="control-header">
                    <h3>3. Operations</h3>
                </div>
                <div class="options" id="operations-options">
                    <input type="checkbox" id="add" value="+"><label for="add">Addition (+)</label>
                    <input type="checkbox" id="subtract" value="-"><label for="subtract">Subtraction (-)</label>
                    <input type="checkbox" id="multiply" value="×"><label for="multiply">Multiplication (×)</label>
                    <input type="checkbox" id="divide" value="÷"><label for="divide">Division (÷)</label>
                </div>
            </div>

            <div class="session-buttons">
                <button class="session-btn" id="reset-btn">Reset All Settings</button>
                <button class="session-btn" id="new-session-btn">Start New Session</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // Data Models & State Management
        // ==========================================
        class DeckManager {
            constructor() {
                this.cards = [];
            }

            generate(focusNumbers, minRange, maxRange, operations) {
                this.cards = [];
                const problems = new Set();

                const addCard = (q, a) => {
                    if (!problems.has(q)) {
                        problems.add(q);
                        this.cards.push({ q, a });
                    }
                };

                operations.forEach(op => {
                    focusNumbers.forEach(focusNum => {
                        for (let i = minRange; i <= maxRange; i++) {
                            if (op === '+') {
                                addCard(`${focusNum} + ${i}`, focusNum + i);
                                addCard(`${i} + ${focusNum}`, i + focusNum);
                            }
                            else if (op === '-') {
                                const sum = focusNum + i;
                                addCard(`${sum} - ${focusNum}`, i);
                            }
                            else if (op === '×') {
                                addCard(`${focusNum} × ${i}`, focusNum * i);
                                addCard(`${i} × ${focusNum}`, i * focusNum);
                            }
                            else if (op === '÷') {
                                if (focusNum !== 0) {
                                    const product = focusNum * i;
                                    addCard(`${product} ÷ ${focusNum}`, i);
                                }
                            }
                        }
                    });
                });

                this.shuffle();
                return this.cards.length > 0;
            }

            shuffle() {
                for (let i = this.cards.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.cards[i], this.cards[j]] = [this.cards[j], this.cards[i]];
                }
            }

            draw() {
                return this.cards.pop();
            }

            reinsertForReview(card) {
                const insertIndex = Math.max(0, this.cards.length - 3);
                this.cards.splice(insertIndex, 0, card);
            }

            get remaining() {
                return this.cards.length;
            }
        }

        class StorageManager {
            static saveSettings(settings) {
                localStorage.setItem('flashCardSettings', JSON.stringify(settings));
            }
            static loadSettings() {
                return JSON.parse(localStorage.getItem('flashCardSettings') || '{}');
            }
            static saveTheme(theme) {
                localStorage.setItem('flashCardTheme', theme);
            }
            static loadTheme() {
                return localStorage.getItem('flashCardTheme') || 'system';
            }
            static clearSettings() {
                localStorage.removeItem('flashCardSettings');
            }
        }

        // ==========================================
        // User Interface Controller
        // ==========================================
        class FlashcardApp {
            constructor() {
                this.deckManager = new DeckManager();
                this.currentCard = null;
                this.isSessionActive = false;
                this.stats = { total: 0, attempts: 0, correct: 0, incorrect: 0 };

                this.cacheDOM();
                this.init();
            }

            cacheDOM() {
                this.dom = {
                    card: document.getElementById('card'),
                    cardText: document.getElementById('card-text'),
                    cardAnswer: document.getElementById('card-answer'),
                    checkBtn: document.getElementById('check-btn'),
                    correctBtn: document.getElementById('correct-btn'),
                    wrongBtn: document.getElementById('wrong-btn'),
                    newSessionBtn: document.getElementById('new-session-btn'),
                    resetBtn: document.getElementById('reset-btn'),
                    numbersOptions: document.getElementById('numbers-options'),
                    selectAllBtn: document.getElementById('select-all-btn'),
                    clearAllBtn: document.getElementById('clear-all-btn'),
                    rangeMin: document.getElementById('range-min'),
                    rangeMax: document.getElementById('range-max'),
                    themeSelect: document.getElementById('theme-select'),
                    progressContainer: document.getElementById('progress-container'),
                    progressBar: document.getElementById('progress-bar'),
                    progressInfo: document.getElementById('progress-info'),
                    stats: {
                        total: document.getElementById('total-cards'),
                        remaining: document.getElementById('cards-remaining'),
                        attempts: document.getElementById('total-attempts'),
                        correct: document.getElementById('num-correct'),
                        incorrect: document.getElementById('num-incorrect'),
                        accuracy: document.getElementById('percentage-correct'),
                    }
                };
            }

            init() {
                this.generateNumberCheckboxes();
                this.bindEvents();
                this.loadTheme();
                this.loadSettings();
                this.resetToInitialState();
            }

            generateNumberCheckboxes() {
                let html = '';
                for (let i = 0; i <= 12; i++) {
                    html += `<input type="checkbox" id="num-${i}" value="${i}"><label for="num-${i}">${i}</label>`;
                }
                this.dom.numbersOptions.innerHTML = html;
            }

            bindEvents() {
                this.dom.newSessionBtn.addEventListener('click', () => this.startSession());
                this.dom.resetBtn.addEventListener('click', () => this.resetAllSettings());
                this.dom.checkBtn.addEventListener('click', () => this.flipCard());
                this.dom.correctBtn.addEventListener('click', () => this.handleGuess(true));
                this.dom.wrongBtn.addEventListener('click', () => this.handleGuess(false));
                this.dom.themeSelect.addEventListener('change', (e) => this.applyTheme(e.target.value));

                this.dom.selectAllBtn.addEventListener('click', () => this.toggleCheckboxes(true));
                this.dom.clearAllBtn.addEventListener('click', () => this.toggleCheckboxes(false));
            }

            toggleCheckboxes(state) {
                document.querySelectorAll('#numbers-options input[type="checkbox"]').forEach(cb => cb.checked = state);
            }

            loadTheme() {
                const theme = StorageManager.loadTheme();
                this.dom.themeSelect.value = theme;
                this.applyTheme(theme);
            }

            applyTheme(theme) {
                StorageManager.saveTheme(theme);
                const isDark = (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) || theme === 'dark';
                document.body.className = isDark ? 'dark-theme' : 'light-theme';
            }

            loadSettings() {
                const settings = StorageManager.loadSettings();

                if (settings.numbers) {
                    settings.numbers.forEach(num => {
                        const el = document.getElementById(`num-${num}`);
                        if (el) el.checked = true;
                    });
                }
                if (settings.ops) {
                    settings.ops.forEach(op => {
                        const el = document.querySelector(`#operations-options input[value="${op}"]`);
                        if (el) el.checked = true;
                    });
                }
                if (settings.rangeMin !== undefined) this.dom.rangeMin.value = settings.rangeMin;
                if (settings.rangeMax !== undefined) this.dom.rangeMax.value = settings.rangeMax;
            }

            saveSettings(numbers, ops, rangeMin, rangeMax) {
                StorageManager.saveSettings({ numbers, ops, rangeMin, rangeMax });
            }

            resetAllSettings() {
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                this.dom.rangeMin.value = 0;
                this.dom.rangeMax.value = 12;
                StorageManager.clearSettings();
                this.resetToInitialState();
            }

            startSession() {
                const numbers = Array.from(document.querySelectorAll('#numbers-options input:checked')).map(cb => parseInt(cb.value));
                const ops = Array.from(document.querySelectorAll('#operations-options input:checked')).map(cb => cb.value);
                const minRange = parseInt(this.dom.rangeMin.value);
                const maxRange = parseInt(this.dom.rangeMax.value);

                if (numbers.length === 0 || ops.length === 0) {
                    alert('Please select at least one Focus Number and one Operation.');
                    return;
                }
                if (minRange > maxRange || isNaN(minRange) || isNaN(maxRange)) {
                    alert('Please ensure your Range Min is less than or equal to Range Max.');
                    return;
                }

                this.saveSettings(numbers, ops, minRange, maxRange);

                const hasCards = this.deckManager.generate(numbers, minRange, maxRange, ops);

                if (!hasCards) {
                    alert('No valid problems could be generated (e.g., trying to divide by zero). Please adjust your settings.');
                    return;
                }

                this.stats = { total: this.deckManager.remaining, attempts: 0, correct: 0, incorrect: 0 };
                this.isSessionActive = true;
                this.dom.card.classList.remove('is-flipped');
                this.dom.card.classList.add('in-session');
                this.dom.progressContainer.style.visibility = 'visible';
                this.dom.progressInfo.classList.add('active');

                this.drawNextCard();
            }

            drawNextCard() {
                this.currentCard = this.deckManager.draw();

                if (this.currentCard) {
                    this.dom.cardText.className = 'card-content';
                    this.dom.cardText.textContent = this.currentCard.q;
                    this.dom.cardAnswer.textContent = `${this.currentCard.q} = ${this.currentCard.a}`;

                    this.dom.checkBtn.disabled = false;
                    this.dom.correctBtn.disabled = true;
                    this.dom.wrongBtn.disabled = true;
                } else {
                    this.endSession();
                }

                this.updateUI();
            }

            flipCard() {
                if (this.currentCard && this.isSessionActive) {
                    this.dom.card.classList.add('is-flipped');
                    this.dom.checkBtn.disabled = true;
                    this.dom.correctBtn.disabled = false;
                    this.dom.wrongBtn.disabled = false;
                }
            }

            handleGuess(isCorrect) {
                this.stats.attempts++;

                if (isCorrect) {
                    this.stats.correct++;
                } else {
                    this.stats.incorrect++;
                    this.deckManager.reinsertForReview(this.currentCard);
                }

                // First, flip the card back to the front
                this.dom.card.classList.remove('is-flipped');

                // Disable action buttons to prevent double-clicking while animating
                this.dom.correctBtn.disabled = true;
                this.dom.wrongBtn.disabled = true;

                // Wait for the card to be halfway flipped (300ms) before changing the math fact text
                setTimeout(() => {
                    this.drawNextCard();
                }, 300);
            }

            endSession() {
                this.currentCard = null;
                this.isSessionActive = false;

                this.dom.card.classList.remove('in-session', 'is-flipped');
                this.dom.progressContainer.style.visibility = 'hidden';
                this.dom.progressInfo.classList.remove('active');

                const accuracy = this.stats.attempts > 0 ? Math.round((this.stats.correct / this.stats.attempts) * 100) : 0;

                this.dom.cardText.className = '';
                this.dom.cardText.innerHTML = `
                    <div class="end-session-message">
                        <strong>Congratulations!</strong>
                        <span>You solved ${this.stats.total} unique problems in ${this.stats.attempts} attempts (${accuracy}% accuracy).</span>
                    </div>`;
                this.dom.cardAnswer.textContent = '';

                this.dom.checkBtn.disabled = true;
                this.dom.correctBtn.disabled = true;
                this.dom.wrongBtn.disabled = true;

                if (typeof confetti === 'function') {
                    confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });
                }
            }

            resetToInitialState() {
                this.currentCard = null;
                this.isSessionActive = false;

                this.dom.card.classList.remove('is-flipped', 'in-session');
                this.dom.cardText.className = 'card-content initial-card-text';
                this.dom.cardText.innerHTML = `Welcome! <span class="initial-card-subtext">Configure your session below to begin.</span>`;
                this.dom.cardAnswer.textContent = '';

                this.dom.progressContainer.style.visibility = 'hidden';
                this.dom.progressInfo.classList.remove('active');
                this.dom.progressBar.style.width = '0%';

                this.stats = { total: 0, attempts: 0, correct: 0, incorrect: 0 };
                this.updateUI();

                this.dom.checkBtn.disabled = true;
                this.dom.correctBtn.disabled = true;
                this.dom.wrongBtn.disabled = true;
            }

            updateUI() {
                // Update stats
                const remainingInDeck = this.isSessionActive && this.currentCard ? this.deckManager.remaining + 1 : 0;
                this.dom.stats.total.textContent = this.stats.total;
                this.dom.stats.remaining.textContent = remainingInDeck;
                this.dom.stats.attempts.textContent = this.stats.attempts;
                this.dom.stats.correct.textContent = this.stats.correct;
                this.dom.stats.incorrect.textContent = this.stats.incorrect;
                this.dom.stats.accuracy.textContent = this.stats.attempts > 0 ?
                    `${Math.round((this.stats.correct / this.stats.attempts) * 100)}%` : '--';

                // Update progress bar
                if (this.stats.total > 0 && this.isSessionActive) {
                    const cardsCompleted = this.stats.total - (this.deckManager.remaining + (this.currentCard ? 1 : 0));
                    const progress = Math.max(0, Math.min(100, (cardsCompleted / this.stats.total) * 100));
                    this.dom.progressBar.style.width = `${progress}%`;
                    this.dom.progressInfo.textContent = `${Math.round(progress)}% complete`;
                }
            }
        }

        // Initialize App on Load
        document.addEventListener('DOMContentLoaded', () => {
            new FlashcardApp();
        });
    </script>
</body>
</html>
